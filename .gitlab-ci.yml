stages:
  - test
  - docker
  - deploy

default:
  interruptible: true

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  PYTHON_IMAGE: python:3.11-slim
  KANIKO_IMAGE: gcr.io/kaniko-project/executor:v1.23.2-debug
  POSTGRES_IMAGE: postgres:16-alpine
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  POSTGRES_DB: rms_ci
  POSTGRES_USER: rms_ci
  POSTGRES_PASSWORD: rms_ci
  DB_NAME: $POSTGRES_DB
  DB_USER: $POSTGRES_USER
  DB_PASSWORD: $POSTGRES_PASSWORD
  DB_HOST: postgres
  DB_PORT: "5432"
  DEBUG: "False"
  SECRET_KEY: "gitlab-ci-secret-key"
  ALLOWED_HOSTS: "localhost,127.0.0.1"
  CORS_ALLOW_ALL_ORIGINS: "True"
  RUN_MIGRATIONS: "false"
  OIDC_RP_CLIENT_ID: "ci-client"
  OIDC_RP_CLIENT_SECRET: "ci-secret"
  OIDC_REALM: "risk-management-system"
  OIDC_SERVER_URL: "http://localhost:8080"

cache:
  key:
    files:
      - requirements.txt
  paths:
    - .pip-cache/

backend:test:
  stage: test
  image: $PYTHON_IMAGE
  services:
    - name: $POSTGRES_IMAGE
      alias: postgres
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends build-essential libpq-dev
    - rm -rf /var/lib/apt/lists/*
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - python manage.py migrate --noinput
    - python manage.py test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

backend:docker:
  stage: docker
  image:
    name: $KANIKO_IMAGE
    entrypoint: [""]
  needs:
    - backend:test
  before_script:
    - mkdir -p /kaniko/.docker
    - >
      printf '{"auths":{"%s":{"username":"%s","password":"%s"}}}'
      "$CI_REGISTRY" "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD"
      > /kaniko/.docker/config.json
  script:
    - |
      DESTINATIONS="--destination=${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA} --destination=${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}"
      if [ "${CI_COMMIT_BRANCH:-}" = "${CI_DEFAULT_BRANCH}" ]; then
        DESTINATIONS="${DESTINATIONS} --destination=${CI_REGISTRY_IMAGE}:latest"
      fi
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile" \
        ${DESTINATIONS}
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

.backend:deploy-template:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - |
      if [ -n "${SSH_PRIVATE_KEY_B64:-}" ]; then
        echo "$SSH_PRIVATE_KEY_B64" | base64 -d | tr -d '\r' > ~/.ssh/id_ed25519
      else
        echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
      fi
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - >
      ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "
      set -eu &&
      docker login -u '${CI_REGISTRY_USER}' -p '${CI_REGISTRY_PASSWORD}' '${CI_REGISTRY}' &&
      docker pull '${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}' &&
      docker stop '${BACKEND_CONTAINER_NAME}' || true &&
      docker rm '${BACKEND_CONTAINER_NAME}' || true &&
      docker run -d --name '${BACKEND_CONTAINER_NAME}' --restart unless-stopped
      --env-file '${BACKEND_ENV_FILE}' -p '${BACKEND_HOST_PORT}:8000'
      '${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}'
      "
  needs:
    - backend:docker

backend:deploy:staging:
  extends: .backend:deploy-template
  environment:
    name: staging
  variables:
    DEPLOY_HOST: $STAGING_DEPLOY_HOST
    DEPLOY_USER: $STAGING_DEPLOY_USER
    BACKEND_ENV_FILE: $STAGING_BACKEND_ENV_FILE
    BACKEND_CONTAINER_NAME: rms-backend-staging
    BACKEND_HOST_PORT: "8000"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop" && ($SSH_PRIVATE_KEY || $SSH_PRIVATE_KEY_B64) && $STAGING_DEPLOY_HOST && $STAGING_DEPLOY_USER && $STAGING_BACKEND_ENV_FILE

backend:deploy:production:
  extends: .backend:deploy-template
  environment:
    name: production
  variables:
    DEPLOY_HOST: $PROD_DEPLOY_HOST
    DEPLOY_USER: $PROD_DEPLOY_USER
    BACKEND_ENV_FILE: $PROD_BACKEND_ENV_FILE
    BACKEND_CONTAINER_NAME: rms-backend
    BACKEND_HOST_PORT: "8000"
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && ($SSH_PRIVATE_KEY || $SSH_PRIVATE_KEY_B64) && $PROD_DEPLOY_HOST && $PROD_DEPLOY_USER && $PROD_BACKEND_ENV_FILE
